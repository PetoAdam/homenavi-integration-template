name: Verify Integration

on:
  push:
    branches: ["**"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod

      - name: go vet
        run: go vet ./...

      - name: Homenavi verify
        uses: PetoAdam/homenavi/.github/actions/integration-verify@main
        with:
          manifest_path: manifest/homenavi-integration.json

      - name: gosec
        run: |
          set -euo pipefail
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.0
          "$(go env GOPATH)/bin/gosec" ./...

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: homenavi-integration:latest

      - name: Install Trivy
        run: |
          set -euo pipefail
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin v0.56.1
          trivy --version

      - name: Trivy image scan
        run: |
          set -euo pipefail
          trivy image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH \
            homenavi-integration:latest
